; ============================================================
;  AMP Instance Override – Palworld
;  Drop this file into your AMP Palworld instance folder.
;  It overrides the default module settings so AMP runs the
;  console wrapper script instead of PalServer.exe directly.
;
;  Default instance folder location:
;    C:\AMPDatastore\Instances\<YourInstanceName>\
; ============================================================

[Application]
; Point AMP at the PowerShell wrapper instead of PalServer.exe directly.
; The wrapper starts PalServer.exe and pipes its log to AMP's console.
Executable=powershell.exe
StartupArguments=-ExecutionPolicy Bypass -NonInteractive -File "scripts\start-palworld.ps1"

; Keep the working directory as the instance root so relative paths work
WorkingDirectory=.

; Graceful stop: send Ctrl+C to the PowerShell process so it can clean up
StopMethod=CtrlC
StopTimeout=30

[Console]
; The wrapper writes plain text to stdout — no special parsing needed.
; Change this to "Timestamp" if you want AMP to strip UE log timestamps.
ReadMode=ProcessOutput
TimestampFormat=yyyy.MM.dd-HH.mm.ss

; Highlight important log keywords in AMP's console
[ConsoleFilter.Error]
Pattern=(Error|FATAL|Exception)
Color=Red
[ConsoleFilter.Warning]
Pattern=(Warning|WARN)
Color=Yellow
[ConsoleFilter.Join]
Pattern=(LogNet: Join|player.*connected)
Color=Green
[ConsoleFilter.Leave]
Pattern=(LogNet: UChannel.*Closed|player.*disconnected)
Color=Orange
